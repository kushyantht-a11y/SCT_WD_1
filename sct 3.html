<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GK Quiz Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
}

.quiz-container{
    width:90%;
    max-width:700px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#2563eb;
    margin-bottom:20px;
}

#question{
    font-size:22px;
    margin-bottom:20px;
    font-weight:600;
}

.option{
    width:100%;
    text-align:left;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#e2e8f0;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

.option:hover{
    background:#cbd5e1;
}

.correct{
    background:#22c55e !important;
    color:white;
}

.wrong{
    background:#ef4444 !important;
    color:white;
}

#next-btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
    display:none;
}

#score-box{
    text-align:center;
    display:none;
}

#restart-btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="quiz-container">

    <h1>General Knowledge Quiz</h1>

    <div id="quiz-box">

        <div id="question"></div>

        <div id="options"></div>

        <button id="next-btn">Next Question</button>

    </div>

    <div id="score-box">
        <h2 id="final-score"></h2>
        <button id="restart-btn">Restart Quiz</button>
    </div>

</div>

<script>

const questions = [

{
question:"What is the capital of India?",
options:["Mumbai","New Delhi","Chennai","Kolkata"],
answer:"New Delhi"
},

{
question:"Which planet is known as the Red Planet?",
options:["Earth","Mars","Jupiter","Venus"],
answer:"Mars"
},

{
question:"Who is known as the Father of the Nation in India?",
options:["Jawaharlal Nehru","Subhash Chandra Bose","Mahatma Gandhi","Sardar Patel"],
answer:"Mahatma Gandhi"
},

{
question:"Which is the largest ocean in the world?",
options:["Atlantic Ocean","Indian Ocean","Pacific Ocean","Arctic Ocean"],
answer:"Pacific Ocean"
},

{
question:"What is the national animal of India?",
options:["Tiger","Lion","Elephant","Leopard"],
answer:"Tiger"
},

{
question:"Which country is famous for the Eiffel Tower?",
options:["Germany","France","Italy","Spain"],
answer:"France"
},

{
question:"How many continents are there in the world?",
options:["5","6","7","8"],
answer:"7"
},

{
question:"Which is the fastest land animal?",
options:["Tiger","Horse","Leopard","Cheetah"],
answer:"Cheetah"
},

{
question:"Who invented the telephone?",
options:["Thomas Edison","Alexander Graham Bell","Newton","Einstein"],
answer:"Alexander Graham Bell"
},

{
question:"What is the currency of Japan?",
options:["Won","Yuan","Yen","Dollar"],
answer:"Yen"
}

];

let currentQuestion = 0;
let score = 0;

const questionElement = document.getElementById("question");
const optionsElement = document.getElementById("options");
const nextBtn = document.getElementById("next-btn");

function loadQuestion(){

resetState();

let q = questions[currentQuestion];

questionElement.innerHTML =
`${currentQuestion+1}. ${q.question}`;

q.options.forEach(option => {

const button = document.createElement("button");

button.innerHTML = option;

button.classList.add("option");

button.addEventListener("click",()=>selectAnswer(button,q.answer));

optionsElement.appendChild(button);

});

}

function resetState(){

nextBtn.style.display="none";

optionsElement.innerHTML="";

}

function selectAnswer(selectedButton,correctAnswer){

const buttons =
document.querySelectorAll(".option");

buttons.forEach(button=>{

if(button.innerHTML===correctAnswer){

button.classList.add("correct");

}

if(button===selectedButton &&
button.innerHTML!==correctAnswer){

button.classList.add("wrong");

}

button.disabled=true;

});

if(selectedButton.innerHTML===correctAnswer){

score++;

}

nextBtn.style.display="inline-block";

}

nextBtn.addEventListener("click",()=>{

currentQuestion++;

if(currentQuestion < questions.length){

loadQuestion();

}else{

showScore();

}

});

function showScore(){

document.getElementById("quiz-box").style.display="none";

document.getElementById("score-box").style.display="block";

document.getElementById("final-score").innerHTML =
`🎉 Your Score: ${score} / ${questions.length}`;

}

document.getElementById("restart-btn")
.addEventListener("click",()=>{

currentQuestion = 0;
score = 0;

document.getElementById("quiz-box").style.display="block";
document.getElementById("score-box").style.display="none";

loadQuestion();

});

loadQuestion();

</script>

</body>
</html>
